services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: todolist-tailscale
    hostname: ${TS_HOSTNAME:-todolist}
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=true
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    cap_add:
      - net_admin
      - sys_module
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  app:
    build: .
    container_name: todolist-app
    network_mode: service:tailscale
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - tailscale
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  tailscale-state:
